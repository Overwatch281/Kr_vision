{% extends 'base.html' %}
{% block title %}Contact — K.R Vision{% endblock %}

{% block content %}
<section class="hero" style="padding: 60px 0;">
    <div class="container">
        <h1>Nous <span>contacter</span></h1>
        <p>On vous répond dans les plus brefs délais</p>
    </div>
</section>

<section class="section">
    <div class="container" style="max-width:700px;">
        <div class="card">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Nom complet *</label>
                    <input type="text" name="name" required placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Sujet *</label>
                    <input type="text" name="subject" required placeholder="Objet de votre message">
                </div>
                <div class="form-group">
                    <label>Message *</label>
                    <textarea name="body" rows="6" required placeholder="Votre message..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">
                    <i class="fas fa-paper-plane"></i> Envoyer
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
