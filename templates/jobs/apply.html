{% extends 'base.html' %}
{% block title %}Postuler — {{ job.title }}{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width:600px;">
        <div class="card">
            <h2 style="color:var(--primary); margin-bottom:6px;">Postuler</h2>
            <p style="color:var(--gray); margin-bottom:24px;">{{ job.title }}</p>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>Lettre de motivation</label>
                    <textarea name="cover_letter" rows="6" placeholder="Présentez-vous et expliquez votre motivation..."></textarea>
                </div>
                <div class="form-group">
                    <label>CV (PDF ou Word) *</label>
                    <input type="file" name="cv" accept=".pdf,.doc,.docx" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">
                    Envoyer ma candidature
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
